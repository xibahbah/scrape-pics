<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jade</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/lucide.min.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Library">
        <nav class="nav-block" id="statusNav">
          <button class="nav-item active" data-filter="all">
            <i data-lucide="images"></i><span>All pictures</span><strong data-count="all">0</strong>
          </button>
          <button class="nav-item" data-filter="favorites">
            <i data-lucide="star"></i><span>Favorites</span><strong data-count="favorites">0</strong>
          </button>
          <button class="nav-item" id="cullMode">
            <i data-lucide="list-checks"></i><span>Review</span>
          </button>
        </nav>

        <div class="side-section">
          <div class="side-label">Photographers</div>
          <div id="handleList" class="handle-list"></div>
        </div>

        <div class="side-section shoots-section">
          <div class="side-label side-label-row"><span>Boards</span><button class="icon-button compact-icon" id="newShoot" title="New board"><i data-lucide="plus"></i></button></div>
          <div id="shootList" class="shoot-list"></div>
        </div>

        <div class="side-section side-section-bottom">
          <div class="import-actions">
            <button class="wide-button" id="openImport">
              <i data-lucide="download"></i><span>Import</span>
            </button>
            <button class="icon-button import-history-button" id="openImportHistory" title="Import history" aria-label="Import history">
              <i data-lucide="history"></i>
            </button>
          </div>
        </div>
      </aside>

      <div class="resize-handle" id="sidebarResize" data-resize="sidebar" aria-label="Resize library"></div>

      <main class="workspace">
        <header class="library-toolbar" aria-label="Library filters">
          <div class="library-filter-actions">
            <button class="library-filter-button" id="reviewToggle" title="Open review">
              <i data-lucide="list-checks"></i><span>Review</span>
            </button>
            <button class="library-filter-button" id="colorFilterToggle" title="Filter by color">
              <i data-lucide="palette"></i><span>Color</span>
            </button>
            <button class="library-filter-button" id="ratingFilterToggle" title="Filter by rating">
              <i data-lucide="star"></i><span>Rating</span>
            </button>
          </div>
          <div class="library-toolbar-actions">
            <button class="library-filter-button randomize-button" id="randomizeLibrary" title="Shuffle this collection">
              <i data-lucide="shuffle"></i><span>Randomize</span>
            </button>
            <label class="rating-sort" title="Sort by rating">
              <i data-lucide="arrow-up-down"></i>
              <select id="ratingSort">
                <option value="">Sort rating</option>
                <option value="high">Highest first</option>
                <option value="low">Lowest first</option>
              </select>
            </label>
          </div>
        </header>

        <header class="focus-toolbar" id="focusToolbar" aria-label="Image inspection">
          <div class="focus-nav">
            <button class="icon-button" id="exitFocus" title="Back to library"><i data-lucide="arrow-left"></i></button>
            <span class="focus-count" id="focusCount">0 / 0</span>
          </div>
          <label class="focus-zoom">
            <i data-lucide="minus"></i>
            <input id="focusZoomInput" type="range" min="20" max="300" value="100" />
            <i data-lucide="plus"></i>
            <output id="focusZoomValue">100%</output>
          </label>
          <div class="focus-nav focus-stepper">
            <label class="focus-decision">
              <i data-lucide="check-check"></i>
              <select id="focusDecision" aria-label="Review decision">
                <option value="unreviewed">Decide</option>
                <option value="keep">Keep</option>
                <option value="reject">Reject</option>
              </select>
            </label>
            <button class="icon-button" id="focusPrevious" title="Previous image"><i data-lucide="chevron-left"></i></button>
            <button class="icon-button" id="focusNext" title="Next image"><i data-lucide="chevron-right"></i></button>
          </div>
        </header>

        <div class="filter-popover color-popover" id="colorPopover" hidden>
          <div class="filter-popover-head"><span>Filter by color</span><button class="icon-button compact-icon" data-close-filter title="Close"><i data-lucide="x"></i></button></div>
          <div class="color-filter-bar" id="colorFilterBar" aria-label="Filter by palette color"></div>
        </div>
        <div class="filter-popover rating-popover" id="ratingPopover" hidden>
          <div class="filter-popover-head"><span>Rating</span><button class="icon-button compact-icon" data-close-filter title="Close"><i data-lucide="x"></i></button></div>
          <label class="filter-field"><span>Show</span><select id="ratingFilter" class="popover-select">
            <option value="">All ratings</option>
            <option value="0">Unrated</option>
            <option value="1">1 star</option>
            <option value="2">2 stars</option>
            <option value="3">3 stars</option>
            <option value="4">4 stars</option>
            <option value="5">5 stars</option>
          </select></label>
        </div>

        <div class="job-strip" id="jobStrip"></div>
        <section class="grid-view active" id="gridView" aria-label="Grid"></section>
        <section class="focus-view" id="focusView" aria-label="Image inspection"></section>

        <section class="review-view" id="reviewView" aria-label="Review selection">
          <div class="review-top">
            <div>
              <div class="review-title">Review</div>
              <div class="review-meta" id="reviewMeta">Click images to mark them for rejection.</div>
            </div>
            <div class="review-actions">
              <button class="secondary-button" id="cancelCull" title="Return to library">Cancel</button>
              <button class="decision-button reject" id="confirmReject" title="Reject selected images" disabled>
                <i data-lucide="x"></i><span id="confirmRejectLabel">Confirm reject</span>
              </button>
            </div>
          </div>
          <div class="cull-grid" id="cullGrid"></div>
        </section>
      </main>

      <div class="resize-handle" id="inspectorResize" data-resize="inspector" aria-label="Resize inspector"></div>

      <aside class="inspector" id="inspector" aria-label="Details"></aside>
    </div>

    <dialog class="import-dialog" id="importDialog">
      <form method="dialog" class="dialog-panel">
        <div class="dialog-head">
          <h2>Import Instagram</h2>
          <button class="icon-button" value="cancel" title="Close">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="import-mode" role="group" aria-label="Instagram import type">
          <button class="import-mode-button active" type="button" data-import-mode="profile">Profile</button>
          <button class="import-mode-button" type="button" data-import-mode="post">Single post</button>
        </div>

        <label class="field">
          <span id="importSourceLabel">Instagram profile link</span>
          <input
            id="importHandle"
            type="text"
            value="https://www.instagram.com/elizavetaporodina/"
            placeholder="https://www.instagram.com/photographer/"
            autocomplete="off"
          />
        </label>

        <label class="field" id="postDestinationField" hidden>
          <span>Save to photographer</span>
          <input id="postDestination" type="text" list="photographerDestinations" placeholder="Create from post owner" autocomplete="off" />
          <datalist id="photographerDestinations"></datalist>
        </label>

        <div class="field-grid" id="profileImportFields">
          <label class="field">
            <span>Browser</span>
            <select id="importBrowser">
              <option value="chrome">Chrome</option>
              <option value="safari">Safari</option>
              <option value="firefox">Firefox</option>
              <option value="brave">Brave</option>
              <option value="edge">Edge</option>
            </select>
          </label>
          <label class="field">
            <span>Pages</span>
            <input id="importPages" type="number" min="1" placeholder="All" />
          </label>
        </div>

        <label class="field">
          <span>Cookie DB</span>
          <input id="cookieFile" type="text" autocomplete="off" />
        </label>

        <div class="dialog-actions">
          <button type="button" class="primary-button" id="startImport">
            <i data-lucide="instagram"></i><span id="startImportLabel">Import profile</span>
          </button>
        </div>

        <div class="import-local-divider"><span>or</span></div>
        <label class="field">
          <span>Local image folder</span>
          <input id="folderPath" type="text" placeholder="/Users/you/Pictures/reference" autocomplete="off" />
        </label>
        <div class="dialog-actions import-local-action">
          <button type="button" class="secondary-button" id="scanFolder">
            <i data-lucide="folder-search"></i><span>Add local folder</span>
          </button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="shootDialog">
      <form method="dialog" class="dialog-panel compact-dialog">
        <div class="dialog-head">
          <h2>New Board</h2>
          <button class="icon-button" value="cancel" title="Close"><i data-lucide="x"></i></button>
        </div>
        <label class="field">
          <span>Name</span>
          <input id="shootName" type="text" value="Board 1" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button class="primary-button" id="createShoot" value="default"><i data-lucide="plus"></i><span>Create Board</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="renameHandleDialog">
      <form class="dialog-panel compact-dialog" id="renameHandleForm">
        <div class="dialog-head">
          <h2>Rename Photographer</h2>
          <button class="icon-button" type="button" id="cancelRenameHandle" title="Close"><i data-lucide="x"></i></button>
        </div>
        <label class="field">
          <span>Name</span>
          <input id="renameHandleInput" type="text" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelRenameHandleSecondary">Cancel</button>
          <button class="primary-button" type="submit"><i data-lucide="check"></i><span>Rename</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="deleteHandleDialog">
      <form class="dialog-panel compact-dialog" id="deleteHandleForm">
        <div class="dialog-head">
          <h2>Delete Photographer</h2>
          <button class="icon-button" type="button" id="cancelDeleteHandle" title="Close"><i data-lucide="x"></i></button>
        </div>
        <p class="dialog-copy" id="deleteHandleCopy"></p>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelDeleteHandleSecondary">Cancel</button>
          <button class="danger-button" type="submit"><i data-lucide="trash-2"></i><span>Delete locally</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="renameShootDialog">
      <form class="dialog-panel compact-dialog" id="renameShootForm">
        <div class="dialog-head">
          <h2>Rename Board</h2>
          <button class="icon-button" type="button" id="cancelRenameShoot" title="Close"><i data-lucide="x"></i></button>
        </div>
        <label class="field">
          <span>Name</span>
          <input id="renameShootInput" type="text" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelRenameShootSecondary">Cancel</button>
          <button class="primary-button" type="submit"><i data-lucide="check"></i><span>Rename</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="deleteShootDialog">
      <form class="dialog-panel compact-dialog" id="deleteShootForm">
        <div class="dialog-head">
          <h2>Delete Board</h2>
          <button class="icon-button" type="button" id="cancelDeleteShoot" title="Close"><i data-lucide="x"></i></button>
        </div>
        <p class="dialog-copy" id="deleteShootCopy"></p>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelDeleteShootSecondary">Cancel</button>
          <button class="danger-button" type="submit"><i data-lucide="trash-2"></i><span>Delete board</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="importHistoryDialog">
      <form method="dialog" class="dialog-panel import-history-dialog">
        <div class="dialog-head">
          <h2>Import History</h2>
          <button class="icon-button" value="cancel" title="Close"><i data-lucide="x"></i></button>
        </div>
        <div class="import-history-list" id="importHistoryList"></div>
        <div class="dialog-actions">
          <button class="danger-button" type="button" id="deleteImportBatch" disabled><i data-lucide="trash-2"></i><span>Delete selected</span></button>
        </div>
      </form>
    </dialog>

    <dialog class="import-dialog" id="deleteImportDialog">
      <form class="dialog-panel compact-dialog" id="deleteImportForm">
        <div class="dialog-head">
          <h2>Delete Import</h2>
          <button class="icon-button" type="button" id="cancelDeleteImport" title="Close"><i data-lucide="x"></i></button>
        </div>
        <p class="dialog-copy" id="deleteImportCopy"></p>
        <div class="dialog-actions">
          <button class="secondary-button" type="button" id="cancelDeleteImportSecondary">Cancel</button>
          <button class="danger-button" type="submit"><i data-lucide="trash-2"></i><span>Delete locally</span></button>
        </div>
      </form>
    </dialog>

    <div class="asset-menu" id="assetMenu" hidden></div>
    <div class="asset-menu handle-menu" id="handleMenu" hidden></div>
    <div class="asset-menu handle-menu" id="shootMenu" hidden></div>
  </body>
</html>
